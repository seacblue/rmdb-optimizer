# ============================================================
# RMDB CI Pipeline
#
# 当前分支以可交付的服务端集成验证为主：
#   1. 安装依赖
#   2. 构建 rmdb 服务端
#   3. 启动服务端并通过 socket 跑非交互式 SQL 集成测试
#   4. 做轻量 CI 一致性检查
#   5. 失败时上传日志与 output.txt
# ============================================================

name: RMDB CI

on:
  push:
    branches: [main, feat/*, dev/*]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      # -------------------------------------------------------
      # 步骤 1：检出代码
      # -------------------------------------------------------
      - name: Checkout repository
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      # -------------------------------------------------------
      # 步骤 2：安装构建依赖
      # -------------------------------------------------------
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential \
            cmake \
            g++ \
            flex \
            bison \
            libreadline-dev \
            python3

      # -------------------------------------------------------
      # 步骤 3：CMake 配置
      # -------------------------------------------------------
      - name: Configure
        run: |
          mkdir -p build
          cd build
          cmake .. -DCMAKE_BUILD_TYPE=Debug

      # -------------------------------------------------------
      # 步骤 4：编译 rmdb 服务端
      # -------------------------------------------------------
      - name: Build rmdb
        run: |
          cd build
          cmake --build . -j$(nproc) --target rmdb

      # -------------------------------------------------------
      # 步骤 5：运行非交互式集成测试
      # -------------------------------------------------------
      - name: Run integration test
        run: |
          cd build
          ./bin/rmdb execution_test_db > server.log 2>&1 &
          SERVER_PID=$!
          cleanup() {
            kill -INT "$SERVER_PID" >/dev/null 2>&1 || true
            wait "$SERVER_PID" >/dev/null 2>&1 || true
          }
          trap cleanup EXIT
          python3 ../src/test/integration_test.py \
            --host 127.0.0.1 \
            --port 8765 \
            --output "$(pwd)/execution_test_db/output.txt"

      # -------------------------------------------------------
      # 步骤 6：轻量 CI 一致性检查
      # -------------------------------------------------------
      - name: CI check
        run: |
          bash scripts/ci_check.sh 2>&1

      # -------------------------------------------------------
      # 步骤 7：失败时上传日志
      # -------------------------------------------------------
      - name: Upload integration artifacts
        uses: actions/upload-artifact@v7
        if: failure()
        with:
          name: integration-artifacts
          path: |
            build/server.log
            build/execution_test_db/output.txt
          retention-days: 7
