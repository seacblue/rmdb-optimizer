# ============================================================
# RMDB CI Pipeline
#
# CI 流程：
#   1. 安装依赖（含 ccache）→ 编译全部（ccache 加速）
#   2. OJ 冒烟测试 + 压力测试（并行执行，互不等待）
#   3. 失败时上传日志
# ============================================================

name: RMDB CI

on:
  push:
    branches: [main, master, feat/*, dev/*]
  pull_request:
    branches: [main, master]

env:
  CCACHE_DIR: ${{ github.workspace }}/.ccache
  CCACHE_MAXSIZE: 500M

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq --no-install-recommends \
            build-essential \
            cmake \
            g++ \
            flex \
            bison \
            libreadline-dev \
            libgtest-dev \
            python3 \
            ccache

      - name: Restore ccache
        uses: actions/cache@v4
        with:
          path: ${{ env.CCACHE_DIR }}
          key: ccache-${{ runner.os }}-${{ hashFiles('**/CMakeLists.txt', '**/*.cpp', '**/*.h') }}
          restore-keys: |
            ccache-${{ runner.os }}-

      - name: Configure and build
        run: |
          cmake -B build -DCMAKE_BUILD_TYPE=Debug
          cmake --build build -j$(nproc)

      - name: Show ccache stats
        run: ccache -s

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-artifacts
          path: build/
          retention-days: 1

  test-oj:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: build-artifacts
          path: build/

      - name: Restore permissions
        run: chmod +x build/bin/*

      - name: Run OJ smoke tests
        run: |
          cd build
          ctest -R "^test_oj" --output-on-failure --timeout 120 -j1
        shell: bash

      - name: Upload OJ test artifacts
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: test-artifacts-oj
          path: build/Testing/
          retention-days: 7

  test-stress:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: build-artifacts
          path: build/

      - name: Restore permissions
        run: chmod +x build/bin/*

      - name: Run stress tests
        run: |
          cd build
          ctest -R "^stress" --output-on-failure --timeout 600 -j1
        shell: bash
        continue-on-error: true

      - name: Upload stress test artifacts
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: test-artifacts-stress
          path: build/Testing/
          retention-days: 7
